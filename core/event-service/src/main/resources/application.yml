server:
  port: 0

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://event-db:5432/ewm-event
    username: event
    password: event
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}