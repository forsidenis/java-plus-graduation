server:
  port: 0

spring:
  application:
    name: main-service
  config:
    import: "configserver:"
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true
  jpa:
    hibernate:
      ddl-auto: create-drop

logging:
  level:
    ru.practicum: DEBUG

stats:
  server:
    url: ${STATS_SERVER_URL:http://localhost:9090}
  client:
    enabled: true