spring:
  application:
    name: main-service
  cloud:
    config:
      discovery:
        enabled: true
        service-id: CONFIG-SERVER
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        multiplier: 1.5

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true