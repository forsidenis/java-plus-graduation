server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ewm-main
    username: main
    password:
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

stats:
  server:
    url: http://localhost:9090

logging:
  level:
    ru.practicum: DEBUG