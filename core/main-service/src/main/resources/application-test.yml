server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ewm-main
    username: main
    password:

stats:
  server:
    url: http://localhost:9090

logging:
  level:
    ru.practicum: DEBUG