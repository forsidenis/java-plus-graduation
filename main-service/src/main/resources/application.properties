server.port=8080
client.url=http://stat-server:9090

spring.datasource.url=${SPRING_DATASOURCE_URL_MAIN_SERVICE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME_MAIN_SERVICE}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD_MAIN_SERVICE}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false