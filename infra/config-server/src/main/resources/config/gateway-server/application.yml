server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        # ===== СНАЧАЛА МАРШРУТЫ ДЛЯ EVENT-SERVICE (БОЛЕЕ СПЕЦИФИЧНЫЕ) =====

        - id: event-service-admin
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**
          filters:
            - StripPrefix=0

        - id: event-service-private
          uri: lb://event-service
          predicates:
            - Path=/users/{userId}/events/**
          filters:
            - StripPrefix=0

        - id: event-service-public
          uri: lb://event-service
          predicates:
            - Path=/events/**
          filters:
            - StripPrefix=0

        - id: category-service-admin
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**
          filters:
            - StripPrefix=0

        - id: category-service-public
          uri: lb://event-service
          predicates:
            - Path=/categories/**
          filters:
            - StripPrefix=0

        - id: compilation-service-admin
          uri: lb://event-service
          predicates:
            - Path=/admin/compilations/**
          filters:
            - StripPrefix=0

        - id: compilation-service-public
          uri: lb://event-service
          predicates:
            - Path=/compilations/**
          filters:
            - StripPrefix=0

        # ===== ЗАТЕМ МАРШРУТЫ ДЛЯ REQUEST-SERVICE =====

        - id: request-service-all-with-status
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/allWithStatus/list
          filters:
            - StripPrefix=0

        - id: request-service-private-events
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/events/{eventId}/requests/**
          filters:
            - StripPrefix=0

        - id: request-service-private-requests
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/**
          filters:
            - StripPrefix=0

        # ===== МАРШРУТЫ ДЛЯ USER-SERVICE =====

        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
          filters:
            - StripPrefix=0

        # ===== МАРШРУТЫ ДЛЯ RATING-SERVICE =====

        - id: rating-service-private
          uri: lb://rating-service
          predicates:
            - Path=/private/events/**
          filters:
            - StripPrefix=0

        - id: rating-service-public
          uri: lb://rating-service
          predicates:
            - Path=/public/events/**
          filters:
            - StripPrefix=0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  info:
    env:
      enabled: true

logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.web.reactive: DEBUG