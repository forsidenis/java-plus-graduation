spring:
  cloud:
    gateway:
      routes:
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**, /events/**, /users/*/events/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/admin/categories/**, /categories/**
        - id: compilation-service
          uri: lb://compilation-service
          predicates:
            - Path=/admin/compilations/**, /compilations/**
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**
        - id: rating-service
          uri: lb://rating-service
          predicates:
            - Path=/private/events/**, /public/events/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost
    instance-id: ${spring.application.name}:${random.value}
    leaseRenewalIntervalInSeconds: 10