server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: admin_route
          uri: lb://main-service
          predicates:
            - Path=/admin/**
        - id: users_route
          uri: lb://main-service
          predicates:
            - Path=/users/**
        - id: events_route
          uri: lb://main-service
          predicates:
            - Path=/events/**
        - id: compilations_route
          uri: lb://main-service
          predicates:
            - Path=/compilations/**
        - id: categories_route
          uri: lb://main-service
          predicates:
            - Path=/categories/**
        - id: private_route
          uri: lb://main-service
          predicates:
            - Path=/private/**
        - id: public_route
          uri: lb://main-service
          predicates:
            - Path=/public/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  info:
    env:
      enabled: true

logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.web.reactive: DEBUG