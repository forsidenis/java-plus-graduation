server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: request-service-all-with-status
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/allWithStatus/list
          filters:
            - StripPrefix=0

        - id: request-service-private-events
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/events/{eventId}/requests/**
          filters:
            - StripPrefix=0

        - id: request-service-private-requests
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/**
          filters:
            - StripPrefix=0

        - id: event-service-private
          uri: lb://event-service
          predicates:
            - Path=/users/{userId}/events/**
          filters:
            - StripPrefix=0

        - id: event-service-admin
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**
          filters:
            - StripPrefix=0

        - id: event-service-public
          uri: lb://event-service
          predicates:
            - Path=/events/**
          filters:
            - StripPrefix=0

        - id: category-service-admin
          uri: lb://category-service
          predicates:
            - Path=/admin/categories/**
          filters:
            - StripPrefix=0

        - id: category-service-public
          uri: lb://category-service
          predicates:
            - Path=/categories/**
          filters:
            - StripPrefix=0

        - id: compilation-service-admin
          uri: lb://compilation-service
          predicates:
            - Path=/admin/compilations/**
          filters:
            - StripPrefix=0

        - id: compilation-service-public
          uri: lb://compilation-service
          predicates:
            - Path=/compilations/**
          filters:
            - StripPrefix=0

        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
          filters:
            - StripPrefix=0

        - id: rating-service-private
          uri: lb://rating-service
          predicates:
            - Path=/private/events/**
          filters:
            - StripPrefix=0

        - id: rating-service-public
          uri: lb://rating-service
          predicates:
            - Path=/public/events/**
          filters:
            - StripPrefix=0

        - id: stats-server-hit
          uri: lb://stats-server
          predicates:
            - Path=/hit
          filters:
            - StripPrefix=0

        - id: stats-server-stats
          uri: lb://stats-server
          predicates:
            - Path=/stats
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      enabled: true