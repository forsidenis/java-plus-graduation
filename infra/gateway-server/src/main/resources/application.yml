server:
  port: 8080

spring:
  application:
    name: gateway-server
    config:
      import: "configserver:"
    sql:
      init:
        mode: always
        schema-locations: classpath:schema.sql
        continue-on-error: true
    jpa:
      hibernate:
        ddl-auto: create-drop

  logging:
    level:
      ru.practicum: DEBUG