spring:
  profiles:
    active: h2
  application:
    name: stats-server
  cloud:
    config:
      enabled: false
    h2:
      console:
        enabled: true
        path: /h2-console
    sql:
      init:
        mode: always

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost
    instance-id: ${spring.application.name}:${random.value}
    leaseRenewalIntervalInSeconds: 10