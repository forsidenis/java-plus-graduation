server:
  port: 0

spring:
  application:
    name: stats-server
  profiles:
    default: test
  config:
    import: "configserver:"
  datasource:
    url: jdbc:postgresql://stats-server-db:5432/ewm-stat
    username: stat
    password: stat
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

logging:
  level:
    ru.practicum.stat: DEBUG