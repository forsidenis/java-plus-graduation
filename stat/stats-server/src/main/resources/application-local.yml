server:
  port: 9090

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.h2.Driver
    username: stat
    password:
    url: jdbc:h2:mem:stat
  h2:
    console:
      enabled: true
      path: /h2-console
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

logging:
  level:
    ru.practicum.stat.server: DEBUG