server:
  port: 9090

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.h2.Driver
    username: stat
    password:
    url: jdbc:h2:mem:stat
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    ru.practicum.stat.server: DEBUG